name: Sync OM Skills

on:
  schedule:
    # Run daily at 06:00 UTC (after OM team's workday)
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: gh auth status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run sync script
        run: bash scripts/sync-om-skills.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet skills/ om-reference/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            SYNC_VERSION=$(cat skills/.om-sync-version | head -c 7)
            echo "sync_version=$SYNC_VERSION" >> "$GITHUB_OUTPUT"
            echo "Changes detected from OM core @ $SYNC_VERSION"
          fi

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="${major}.${minor}.$((patch + 1))"

          # Bump all three version files
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp && mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json
          jq --arg v "$NEW_VERSION" '.plugins[0].version = $v' .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.tmp && mv .claude-plugin/marketplace.json.tmp .claude-plugin/marketplace.json

          echo "Bumped version: $CURRENT → $NEW_VERSION"

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_VERSION="${{ steps.changes.outputs.sync_version }}"
          BRANCH="chore/sync-om-skills-${SYNC_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add skills/ om-reference/ package.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: sync OM skills + references from open-mercato/open-mercato@${SYNC_VERSION}"
          git push origin "$BRANCH"

          DIFF_STAT=$(git diff --stat HEAD~1)
          gh pr create \
            --title "chore: sync OM skills from open-mercato@${SYNC_VERSION}" \
            --body "## Summary
          - Automated sync of OM skills and AGENTS.md references from \`open-mercato/open-mercato@${SYNC_VERSION}\`
          - Patch version bump

          ## Changed
          \`\`\`
          ${DIFF_STAT}
          \`\`\`

          Generated by the [sync-om-skills workflow](https://github.com/SHGrowth/om-superpowers/actions/workflows/sync-om-skills.yml)." \
            --base main
